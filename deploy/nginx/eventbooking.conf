# Host nginx config for eventbooking domain
# Install: sudo cp deploy/nginx/eventbooking.conf /etc/nginx/sites-available/eventbooking
#          sudo ln -sf /etc/nginx/sites-available/eventbooking /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream eventsolution_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name eventbooking.com www.eventbooking.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eventbooking.com www.eventbooking.com;

    # Certbot fills these paths after: sudo certbot --nginx -d eventbooking.com -d www.eventbooking.com
    ssl_certificate /etc/letsencrypt/live/eventbooking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventbooking.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://eventsolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
