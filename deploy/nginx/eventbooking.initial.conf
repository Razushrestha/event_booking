# Use this BEFORE running certbot (HTTP only, no SSL yet)
# sudo cp deploy/nginx/eventbooking.initial.conf /etc/nginx/sites-available/eventbooking

upstream eventsolution_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name eventbooking.com www.eventbooking.com;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://eventsolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
