# Nginx config for VPS IP access on port 3007 (no domain)
# sudo cp deploy/nginx/ip.conf /etc/nginx/sites-available/eventbooking
# sudo ln -sf /etc/nginx/sites-available/eventbooking /etc/nginx/sites-enabled/
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

upstream eventsolution_app {
    server 127.0.0.1:3007;
    keepalive 32;
}

server {
    listen 3007 default_server;
    listen [::]:3007 default_server;
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://eventsolution_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
