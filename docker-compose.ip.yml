# IP-only hosting — no domain required
# Use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ip.yml up --build -d

services:
  frontend:
    ports:
      - "${APP_PORT:-3007}:80"   # http://eventbooking.duckdns.org:3007
      - "80:80"                  # http://eventbooking.duckdns.org (optional, no port)

  # MongoDB stays internal (mongodb:27017). API connects automatically.
  # For Compass, SSH into VPS and run: docker compose exec mongodb mongosh event
