services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8000
      WEB_HOST: ${APP_URL:-http://localhost:8000}
      MONGO_URI: mongodb://mongodb:27017/event
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      JWT_GENERATE: ${JWT_GENERATE:-change-me-in-production}
      EMAIL: ${EMAIL:-}
      PASSWORD: ${PASSWORD:-}
      FRONTEND_URL: ${APP_URL:-http://localhost:5173}
      IMAGE_URL: ${APP_URL:-http://localhost:8000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_BOOTSTRAP_SECRET: ${ADMIN_BOOTSTRAP_SECRET:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: /api/v1
        VITE_IMAGE_URL: ""
        VITE_PUBLIC_FIREBASE_API_KEY: ${VITE_PUBLIC_FIREBASE_API_KEY:-}
        VITE_PUBLIC_FIREBASE_AUTH_DOMAIN: ${VITE_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        VITE_PUBLIC_FIREBASE_PROJECT_ID: ${VITE_PUBLIC_FIREBASE_PROJECT_ID:-}
        VITE_PUBLIC_FIREBASE_STORAGE_BUCKET: ${VITE_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        VITE_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${VITE_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_PUBLIC_FIREBASE_APP_ID: ${VITE_PUBLIC_FIREBASE_APP_ID:-}
        VITE_PUBLIC_FIREBASE_MEASUREMENT_ID: ${VITE_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  uploads_data:
